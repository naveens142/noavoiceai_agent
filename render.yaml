services:
  - type: web
    name: pipecat-agent
    runtime: python-3.11
    region: oregon
    plan: free
    healthCheckPath: /health
    healthCheckInterval: 30
    
    # Auto-deploy on GitHub push
    repo: your-github-username/noavoice_pipecat-agent
    branch: main
    
    # Build and start commands
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python bot_runner.py
    
    # Environment variables (non-sensitive; rest set via Render dashboard)
    envVars:
      - key: LOG_LEVEL
        value: INFO
      - key: MAX_CONCURRENT_BOTS
        value: "20"
      - key: PORT
        value: "7860"
      - key: HOST
        value: "0.0.0.0"
    
    # ⚠️  REQUIRED: Set these in Render Dashboard → Environment:
    # - OPENAI_API_KEY (from https://platform.openai.com/api-keys)
    # - DEEPGRAM_API_KEY (from https://console.deepgram.com/keys)
    # - API_BASE_URL (your backend API URL)
    # - API_USERNAME (backend username)
    # - API_PASSWORD (backend password)
    #
    # OPTIONAL: If connections timeout on restrictive networks:
    # - METERED_TURN_URL (from https://metered.ca, free tier)
    # - METERED_TURN_USERNAME
    # - METERED_TURN_CREDENTIAL
