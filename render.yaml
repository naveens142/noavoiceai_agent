services:
  - type: web
    name: pipecat-agent
    runtime: python-3.11
    region: oregon
    plan: free
    healthCheckPath: /health
    healthCheckInterval: 30
    
    # Auto-deploy on GitHub push
    repo: your-github-username/noavoice_pipecat-agent
    branch: main
    
    # Build and start commands
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python bot_runner.py
    
    # Environment variables (can also be set in Render dashboard)
    envVars:
      - key: LOG_LEVEL
        value: INFO
      - key: MAX_CONCURRENT_BOTS
        value: "20"
      - key: PORT
        value: "7860"
      
      # ⚠️  IMPORTANT: Set these SECRETS in Render dashboard, NOT in this file:
      # - OPENAI_API_KEY (from https://platform.openai.com/api-keys)
      # - DEEPGRAM_API_KEY (from https://console.deepgram.com/keys)
      # - API_BASE_URL (your backend API URL)
      # - API_USERNAME (for backend authentication)
      # - API_PASSWORD (for backend authentication)
